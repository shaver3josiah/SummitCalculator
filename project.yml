# XcodeGen project spec for Summit. Do not edit generated Summit.xcodeproj.
name: Summit
options:
  bundleIdPrefix: com.shaver
  deploymentTarget:
    iOS: "17.0"
packages:
  SummitCore:
    path: Packages/SummitCore
targets:
  Summit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - "Support/ExportOptions.plist"
          - "Resources/FoodArt/svg/**"
    dependencies:
      - package: SummitCore
        product: SummitCore
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.shaver.summitcalculator
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "$(BUILD_NUMBER:default=1)"
        DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug: {}
        Release: {}
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: Summit
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Archivo.ttf
          - Bitter.ttf
          - Bitter-Italic.ttf
          - Rye-Regular.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        # iPad: fullscreen gift app, all four orientations, no Split View/multitasking.
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: LaunchBackground
schemes:
  Summit:
    build:
      targets:
        Summit: all
    run:
      config: Debug
    archive:
      config: Release
