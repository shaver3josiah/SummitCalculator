# CI: runs SummitCore's Swift Package tests on every push and pull request.
name: test
on:
  push:
    branches: ["**"]
  pull_request: {}
jobs:
  swift-test:
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v6
      - name: Run SummitCore tests
        run: swift test --package-path Packages/SummitCore
