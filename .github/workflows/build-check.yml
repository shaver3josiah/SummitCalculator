name: build-check
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  app-build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Select newest Xcode (iOS 26 SDK)
        run: |
          set -e
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -viE 'beta|rc|release[_ ]candidate' | sort -V | tail -1)
          if [ -z "$latest" ]; then echo "No Xcode found under /Applications"; exit 1; fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Fetch fonts
        run: bash scripts/fetch_fonts.sh
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build app (no signing, compile gate)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Summit.xcodeproj \
            -scheme Summit \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Verify bundled sounds and fonts
        run: |
          set -e
          APP=$(find "$RUNNER_TEMP/DerivedData" -type d -name "Summit.app" | head -1)
          if [ -z "$APP" ]; then
            echo "Summit.app not found under derived data"
            exit 1
          fi
          echo "Inspecting $APP"
          missing=0
          for f in tap1.mp3 tap2.mp3 tap3.mp3 tap4.mp3 tap5.mp3 operator.mp3 equals.mp3 clear.mp3 error.mp3 success.mp3 modeswitch.mp3 easteregg.mp3 startup.mp3 Archivo.ttf Bitter.ttf Bitter-Italic.ttf Rye-Regular.ttf; do
            hit=$(find "$APP" -type f -name "$f")
            if [ -z "$hit" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "FOUND: $hit"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "One or more required bundled sounds/fonts are missing from the built app."
            exit 1
          fi
          echo "All 13 sounds and 4 fonts verified present in the built app."
